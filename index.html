<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LostPotential — Temukan Arahmu</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' rx='22' fill='%23F04E23'/%3E%3Cpath d='M30 50 Q50 30 70 50 Q50 70 30 50' stroke='white' stroke-width='3' fill='none'/%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>

<!-- Firebase v10 CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
/* ========================================================
   ROOT & RESET
   ======================================================== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0A0F1E;--ink2:#3D4460;--ink3:#8891AB;--ink4:#C8CEDF;
  --surf:#FFFFFF;--surf2:#F4F5F9;--surf3:#ECEEF5;--surf4:#E2E5EF;
  --blue:#1847ED;--blue-d:#1239C4;--blue-l:#EEF2FD;--blue-m:#7BA2F5;
  --orange:#F04E23;--orange-l:#FEF0EC;--orange-d:#C43C14;
  --green:#00966A;--green-l:#E5F7F2;--green-d:#006B4C;
  --purple:#6D28D9;--purple-l:#F0EEFF;
  --amber:#D97706;--amber-l:#FEF9EC;
  --wa-green:#25D366;--wa-green-d:#128C7E;--wa-green-l:#E8FAF0;
  --r:14px;--r-sm:10px;--r-lg:20px;--r-xl:26px;
  --ease:cubic-bezier(.4,0,.2,1);--dur:.22s;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.07);
}
[data-dark]{
  --ink:#F0F2FA;--ink2:#A8B0C8;--ink3:#636A84;--ink4:#3A3F55;
  --surf:#141824;--surf2:#1C2130;--surf3:#242B3E;--surf4:#2E3650;
  --blue-l:#0F1E4A;--blue-m:#4A72D9;
  --orange-l:#3A1A0E;--green-l:#0A2E22;--purple-l:#1C1040;--amber-l:#2A1E05;
  --wa-green-l:#0A2E1C;
  --shadow-sm:0 1px 3px rgba(0,0,0,.2);
  --shadow:0 4px 16px rgba(0,0,0,.3);
  --shadow-lg:0 12px 40px rgba(0,0,0,.4);
}

html,body{min-height:100%;overscroll-behavior:none}
body{font-family:'DM Sans',sans-serif;background:var(--surf2);color:var(--ink);overflow-x:hidden;font-size:15px;line-height:1.6;transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
h1,h2,h3,h4,.brand{font-family:'Bricolage Grotesque',sans-serif;line-height:1.15}
a{text-decoration:none;color:inherit}
input,button,textarea,select{font-family:'DM Sans',sans-serif}

.page{display:none}
.page.on{display:block;animation:rise .28s var(--ease)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ========================================================
   PANITIA DASHBOARD — NEW
   ======================================================== */
.panitia-dashboard{max-width:1200px;margin:0 auto;padding:28px 20px 100px}
.panitia-header{margin-bottom:32px}
.panitia-header h1{font-size:28px;font-weight:800;margin-bottom:8px;color:var(--ink)}
.panitia-header p{color:var(--ink3);font-size:14px}
.panitia-controls{display:flex;gap:12px;margin-bottom:24px;align-items:center}
#panitia-create-btn{background:var(--blue);color:#fff;border:none;padding:12px 24px;border-radius:50px;font-weight:700;font-size:14px;cursor:pointer;transition:all var(--dur) var(--ease);display:inline-flex;align-items:center;gap:8px}
#panitia-create-btn:hover{background:var(--blue-d);transform:translateY(-1px)}
#panitia-event-list{display:grid;grid-template-columns:1fr;gap:12px}
.panitia-event-item{background:var(--surf);border:1px solid var(--surf3);border-radius:var(--r-lg);padding:16px;transition:all var(--dur) var(--ease));box-shadow:var(--shadow-sm)}
.panitia-event-item:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.pei-top{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.pei-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pei-info{flex:1}
.pei-info h3{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px}
.pei-info p{font-size:12px;color:var(--ink3)}
.pei-actions{display:flex;gap:8px}
.pei-btn{padding:8px 16px;border-radius:50px;font-size:12px;font-weight:700;border:1.5px solid;cursor:pointer;transition:all var(--dur) var(--ease))}
.pei-edit{background:var(--blue-l);color:var(--blue);border-color:var(--blue)}
.pei-edit:hover{background:var(--blue);color:#fff}
.pei-delete{background:var(--orange-l);color:var(--orange);border-color:var(--orange)}
.pei-delete:hover{background:var(--orange);color:#fff}
.pei-details{display:flex;gap:16px;font-size:12px;flex-wrap:wrap;margin-top:8px}
.pei-details span{color:var(--ink2)}
.pei-details strong{color:var(--ink);margin-right:4px}
.badge{display:inline-block;padding:4px 10px;border-radius:50px;font-size:10.5px;font-weight:700}
.badge-active{background:var(--green-l);color:var(--green-d)}
.badge-inactive{background:var(--orange-l);color:var(--orange-d)}
.badge-ended{background:var(--ink3);color:#fff}

/* ========================================================
   PANITIA MODAL — NEW
   ======================================================== */
#panitia-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .28s ease}
#panitia-modal-overlay.open{opacity:1;pointer-events:all}
#panitia-modal{background:var(--surf);border-radius:var(--r-xl);max-width:500px;width:100%;max-height:90vh;overflow-y:auto;padding:28px;box-shadow:var(--shadow-lg);transform:scale(0.95);transition:transform .28s ease}
#panitia-modal-overlay.open #panitia-modal{transform:scale(1)}
#panitia-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
#panitia-modal-title{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:800;color:var(--ink)}
#panitia-modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--ink3);transition:color var(--dur) var(--ease))}
#panitia-modal-close:hover{color:var(--ink)}
.panitia-form-group{margin-bottom:16px}
.panitia-form-group label{display:block;font-size:12.5px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.panitia-form-group input,.panitia-form-group textarea,.panitia-form-group select{width:100%;background:var(--surf2);border:1.5px solid var(--surf3);border-radius:var(--r-sm);padding:12px 14px;font-size:14px;color:var(--ink);font-family:'DM Sans',sans-serif;outline:none;transition:all var(--dur) var(--ease))}
.panitia-form-group input:focus,.panitia-form-group textarea:focus,.panitia-form-group select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,71,237,.1)}
.panitia-form-group textarea{resize:vertical;min-height:80px}
.panitia-form-actions{display:flex;gap:10px;margin-top:20px}
.panitia-btn-submit,.panitia-btn-cancel{flex:1;padding:12px;border-radius:var(--r-sm);font-weight:700;font-size:14px;cursor:pointer;transition:all var(--dur) var(--ease));border:none}
.panitia-btn-submit{background:var(--blue);color:#fff}
.panitia-btn-submit:hover{background:var(--blue-d);transform:translateY(-1px)}
.panitia-btn-cancel{background:var(--surf3);color:var(--ink)}
.panitia-btn-cancel:hover{background:var(--surf4)}

/* ========================================================
   TOAST
   ======================================================== */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--surf);padding:11px 20px;border-radius:50px;font-size:13.5px;font-weight:600;display:none;z-index:200}
.toast.show{display:flex;align-items:center;gap:8px;opacity:1;transform:translateX(-50%) translateY(0)}
.toast i{font-size:15px}

@media(max-width:520px){
  .panitia-dashboard{padding:20px 14px 100px}
  .pei-top{flex-wrap:wrap;gap:12px}
  .pei-actions{width:100%;order:3}
  .pei-info{flex:1;min-width:200px}
  #panitia-modal{max-width:100%;padding:20px}
  .panitia-form-actions{flex-direction:column}
}

</style>

</head>
<body>

<!-- PANITIA DASHBOARD PAGE — NEW -->
<div class="page" id="pg-panitia-dashboard">
  <div class="panitia-dashboard">
    <div class="panitia-header">
      <h1>📊 Dashboard Panitia</h1>
      <p>Kelola semua event dan lomba dengan mudah</p>
    </div>

    <div class="panitia-controls">
      <button id="panitia-create-btn">
        <i class="ti ti-plus"></i>
        <span>Buat Event Baru</span>
      </button>
    </div>

    <div id="panitia-event-list">
      <!-- Events akan di-render di sini -->
    </div>
  </div>
</div>

<!-- PANITIA EVENT CREATION MODAL — NEW -->
<div id="panitia-modal-overlay">
  <div id="panitia-modal">
    <div id="panitia-modal-header">
      <h2 id="panitia-modal-title">Buat Event Baru</h2>
      <button id="panitia-modal-close"><i class="ti ti-x"></i></button>
    </div>

    <form id="panitia-event-form">
      <div class="panitia-form-group">
        <label>Judul Event</label>
        <input type="text" name="title" required placeholder="Contoh: Hackathon 2024">
      </div>

      <div class="panitia-form-group">
        <label>Deskripsi</label>
        <textarea name="description" placeholder="Jelaskan tentang event..."></textarea>
      </div>

      <div class="panitia-form-group">
        <label>Kategori</label>
        <input type="text" name="category" placeholder="Contoh: Tech, Design, Business">
      </div>

      <div class="panitia-form-group">
        <label>Icon (Tabler Icon)</label>
        <input type="text" name="icon" value="ti ti-star" placeholder="ti ti-star">
      </div>

      <div class="panitia-form-group">
        <label>Warna Accent</label>
        <input type="color" name="color" value="#1847ED">
      </div>

      <div class="panitia-form-group">
        <label>Prize/Hadiah</label>
        <input type="text" name="prize" placeholder="Contoh: Rp 50.000.000">
      </div>

      <div class="panitia-form-group">
        <label>Deadline</label>
        <input type="text" name="deadline" placeholder="Contoh: 31 Des 2024">
      </div>

      <div class="panitia-form-group">
        <label>Link Event</label>
        <input type="url" name="link" placeholder="https://...">
      </div>

      <div class="panitia-form-group">
        <label>WhatsApp Contact</label>
        <input type="text" name="waContact" placeholder="+62812...">
      </div>

      <div class="panitia-form-group">
        <label>Status</label>
        <select name="status">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="ended">Ended</option>
        </select>
      </div>

      <div class="panitia-form-actions">
        <button type="submit" class="panitia-btn-submit">Simpan Event</button>
        <button type="button" class="panitia-btn-cancel" onclick="closePanitiaModal()">Batal</button>
      </div>
    </form>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div class="toast" id="toast"></div>

<!-- SCRIPT REFERENCES — FIRESTORE & PANITIA -->
<script src="js/firestore-data.js"></script>
<script src="js/quiz-firestore-integration.js"></script>
<script src="js/panitia-dashboard.js"></script>

<!-- HELPER FUNCTIONS & FIREBASE INIT -->
<script>
// Toast helper function
function showToast(message, type = 'info') {
  const toast = document.getElementById('toast');
  if (!toast) return;
  
  toast.textContent = message;
  toast.className = 'toast show';
  
  const icons = {
    success: 'ti ti-check',
    error: 'ti ti-alert-circle',
    warning: 'ti ti-alert-triangle',
    info: 'ti ti-info-circle'
  };
  
  const icon = document.createElement('i');
  icon.className = icons[type] || icons.info;
  toast.prepend(icon);
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Page navigation helper
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  const page = document.getElementById(`pg-${pageId}`);
  if (page) {
    page.classList.add('on');
    
    // Initialize dashboard jika masuk ke panitia
    if (pageId === 'panitia-dashboard') {
      initPanitiaDashboard();
    }
  }
}

// Panitia Modal Functions
function openPanitiaModal() {
  document.getElementById('panitia-modal-overlay').classList.add('open');
}

function closePanitiaModal() {
  document.getElementById('panitia-modal-overlay').classList.remove('open');
  document.getElementById('panitia-event-form').reset();
}

// Check panitia status on page load
firebase.auth().onAuthStateChanged(async (user) => {
  if (user) {
    const isPanitia = await isUserPanitia();
    const panitiaBnav = document.getElementById('bnav-panitia');
    
    if (panitiaBnav && isPanitia) {
      panitiaBnav.style.display = 'flex';
    }
  }
});

// Modal open/close handlers
document.getElementById('panitia-create-btn').addEventListener('click', openPanitiaModal);
document.getElementById('panitia-modal-close').addEventListener('click', closePanitiaModal);

document.getElementById('panitia-modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('panitia-modal-overlay')) {
    closePanitiaModal();
  }
});

// Form submission
document.getElementById('panitia-event-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const formData = new FormData(document.getElementById('panitia-event-form'));
  const eventData = Object.fromEntries(formData);
  
  try {
    await firebase.firestore().collection('events').add({
      ...eventData,
      createdAt: new Date(),
      createdBy: firebase.auth().currentUser.uid
    });
    
    showToast('Event berhasil dibuat!', 'success');
    closePanitiaModal();
    initPanitiaDashboard();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
  }
});
</script>

</body>
</html>
