<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>LostPotential — Upgrade Your Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
    <style>
        :root { --ink:#0A0F1E; --surf:#FFFFFF; --surf2:#F4F5F9; --blue:#1847ED; --orange:#F04E23; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--surf2); color: var(--ink); line-height: 1.6; }
        
        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: var(--ink); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        #splash.hidden { opacity: 0; pointer-events: none; }
        .splash-inner { text-align: center; color: white; animation: float 2s infinite; }
        
        /* Layout */
        .page { display: none; padding-bottom: 80px; }
        .page.on { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Components */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .btn-main { background: var(--blue); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; width: 100%; font-weight: 700; margin-top: 10px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-inner">
            <i class="ti ti-sparkles" style="font-size: 50px;"></i>
            <h1>LostPotential</h1>
            <p>Memuat bakatmu...</p>
        </div>
    </div>

    <div id="pg-home" class="page on">
        <div class="container">
            <h1>Setiap Anak Punya Bakat.</h1>
            <p>Temukan jalanmu bersama 12.400+ pelajar lainnya.</p>
            <button class="btn-main" onclick="go('quiz')">Mulai Kuis Gratis</button>
            <div style="margin-top: 20px;">
                <button onclick="go('login')">Sudah punya akun? Masuk</button>
            </div>
        </div>
    </div>

    <div id="pg-login" class="page">
        <div class="container">
            <h2>Masuk ke Akun</h2>
            <div class="input-group">
                <input type="email" id="email" placeholder="Alamat Email">
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="Password">
            </div>
            <button class="btn-main" onclick="handleLogin()">Masuk Sekarang</button>
            <button style="background:none; border:none; margin-top:10px; cursor:pointer;" onclick="go('home')">Kembali ke Home</button>
        </div>
    </div>

    <div id="pg-quiz" class="page">
        <div class="container">
            <h2>Kuis Minat Bakat</h2>
            <p>Sedang menganalisis potensi unik kamu...</p>
            <button class="btn-main" onclick="go('home')">Selesai & Kembali</button>
        </div>
    </div>

    <script>
        // 1. Inisialisasi Splash (Biar nggak loading terus)
        window.addEventListener("load", () => {
            setTimeout(() => {
                document.getElementById("splash").classList.add("hidden");
            }, 1200);
        });

        // 2. Navigasi Controller (Dibuat lebih kompleks)
        const go = (pageId) => {
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('on'));
            
            const targetPage = document.getElementById('pg-' + pageId);
            if (targetPage) {
                targetPage.classList.add('on');
                console.log("Navigasi ke: " + pageId);
            }
        };

        // 3. Login Controller
        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            
            if(email.includes('@') && pass.length >= 6) {
                alert("Login berhasil! Selamat datang di LostPotential.");
                go('home');
            } else {
                alert("Email atau Password salah!");
            }
        }
    </script>
</body>
</html>
